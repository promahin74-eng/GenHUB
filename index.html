<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GenHub | Address & Card Generator's</title>

<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">

<!-- iOS / Safari PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AddrGen">
<link rel="apple-touch-icon" href="/icons/icon-180x180.png">

<!-- Theme color for browser UI -->
<meta name="theme-color" content="#007AFF">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --surface2: #F2F2F7;
    --surface3: #E5E5EA;
    --label: #000000;
    --label2: #3C3C43;
    --label3: #6e6e73;
    --label4: #aeaeb2;
    --blue: #007AFF;
    --blue-dark: #0062CC;
    --green: #34C759;
    --red: #FF3B30;
    --orange: #FF9500;
    --teal: #5AC8FA;
    --separator: rgba(60,60,67,0.12);
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
    --radius: 16px;
    --radius-sm: 12px;
    --radius-xs: 8px;
    --font: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    --transition: 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--label);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
    will-change: auto;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(242,242,247,0.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--separator);
    padding: 16px 20px 12px;
    will-change: transform;
  }
  .header-inner { max-width: 680px; margin: 0 auto; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 2px; }
  .header-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 20px; height: 20px; fill: #fff; }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--label); }
  .header-sub { font-size: 12px; color: var(--label3); font-weight: 400; margin-left: 48px; }

  /* ─── MAIN ─── */
  .main { max-width: 680px; margin: 0 auto; padding: 20px 16px 100px; }

  /* ─── CONTROL CARD ─── */
  .control-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .control-section { padding: 16px 20px; }
  .control-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--label3); margin-bottom: 10px;
  }
  .separator-line { height: 0.5px; background: var(--separator); margin: 0 20px; }

  /* ─── SEARCH BOX ─── */
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; opacity: 0.4; pointer-events: none;
  }
  .search-input {
    width: 100%; height: 40px;
    background: var(--surface2); border: none; outline: none;
    border-radius: 10px;
    font-family: var(--font); font-size: 15px; color: var(--label);
    padding: 0 12px 0 36px;
    transition: background var(--transition);
    -webkit-appearance: none;
  }
  .search-input:focus { background: var(--surface3); }
  .search-input::placeholder { color: var(--label4); }

  /* ─── COUNTRY GRID ─── */
  .country-grid-wrap {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .country-grid-wrap.open { max-height: 340px; }
  .country-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--separator);
    border-top: 0.5px solid var(--separator);
    overflow-y: auto; max-height: 340px;
  }
  .country-grid::-webkit-scrollbar { width: 4px; }
  .country-grid::-webkit-scrollbar-track { background: transparent; }
  .country-grid::-webkit-scrollbar-thumb { background: var(--label4); border-radius: 2px; }
  .country-item {
    background: var(--surface);
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; cursor: pointer;
    transition: background var(--transition);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .country-item:hover { background: #F0F0F5; }
  .country-item.active { background: #EAF2FF; }
  .country-item.active .country-name { color: var(--blue); font-weight: 600; }
  .country-flag-img { width: 24px; height: 16px; border-radius: 3px; object-fit: cover; flex-shrink: 0; display: block; border: 0.5px solid rgba(0,0,0,0.08); }
  .country-name { font-size: 14px; font-weight: 400; color: var(--label); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ─── SELECTED PILL ─── */
  .selected-country {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--surface2); border-radius: 10px;
    cursor: pointer; transition: background var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .selected-country:hover { background: var(--surface3); }
  .selected-country-flag { width: 26px; height: 18px; border-radius: 3px; object-fit: cover; border: 0.5px solid rgba(0,0,0,0.08); }
  .selected-country-name { font-size: 15px; font-weight: 500; color: var(--label); flex: 1; }
  .chevron-icon { width: 14px; height: 14px; opacity: 0.35; transition: transform var(--transition); flex-shrink: 0; }
  .chevron-icon.rotated { transform: rotate(180deg); }

  /* ─── PLATFORM TOGGLE ─── */
  .platform-toggle {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    background: var(--surface2); border-radius: 10px;
    padding: 2px; gap: 2px;
  }

  /* CREDIT CARD STYLES */
  .credit-card-visual {
    border-radius: 16px;
    padding: 22px 22px 18px;
    position: relative;
    overflow: hidden;
    min-height: 178px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.12);
    user-select: none;
  }
  .cc-bg-circle { position: absolute; border-radius: 50%; pointer-events: none; }
  .cc-top-row { display: flex; align-items: center; justify-content: space-between; position: relative; z-index:2; }
  .cc-bank-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.92); letter-spacing: 0.5px; }
  .cc-network-logo { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 1px; opacity: 0.9; }
  .cc-number { font-size: 16px; font-weight: 600; letter-spacing: 3.5px; color: #fff; margin: 14px 0 8px; position: relative; z-index:2; font-family: 'Courier New', monospace; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .cc-bottom-row { display: flex; align-items: flex-end; justify-content: space-between; position: relative; z-index:2; }
  .cc-holder-label, .cc-expiry-label, .cc-cvv-label { font-size: 9px; color: rgba(255,255,255,0.58); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
  .cc-holder-name { font-size: 13px; font-weight: 600; color: #fff; text-transform: uppercase; letter-spacing: 0.4px; }
  .cc-expiry-wrap { text-align: right; }
  .cc-expiry-val, .cc-cvv-val { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 2px; }
  .cc-cvv-wrap { text-align: center; }
  .platform-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 9px 12px; border-radius: 8px;
    background: transparent; border: none; cursor: pointer;
    font-family: var(--font); font-size: 14px; font-weight: 500;
    color: var(--label3); transition: all var(--transition);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .platform-btn.active {
    background: var(--surface); color: var(--label);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12), 0 0.5px 1px rgba(0,0,0,0.08);
  }
  .platform-btn img { width: 18px; height: 18px; }

  /* ─── QUANTITY STEPPER ─── */
  .qty-row { display: flex; align-items: center; justify-content: space-between; }
  .qty-label-wrap {}
  .qty-title { font-size: 15px; font-weight: 500; color: var(--label); }
  .qty-desc { font-size: 12px; color: var(--label3); margin-top: 1px; }
  .stepper { display: flex; align-items: center; gap: 0; background: var(--surface2); border-radius: 10px; overflow: hidden; }
  .step-btn {
    width: 38px; height: 36px; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-family: var(--font); font-size: 20px; font-weight: 400;
    color: var(--blue); transition: background var(--transition);
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .step-btn:hover { background: var(--surface3); }
  .step-btn:disabled { color: var(--label4); cursor: default; }
  .step-divider { width: 0.5px; height: 24px; background: var(--separator); }
  .step-count { width: 36px; text-align: center; font-size: 15px; font-weight: 600; color: var(--label); user-select: none; }

  /* ─── GENERATE BUTTON ─── */
  .generate-btn {
    width: 100%; height: 52px;
    background: var(--blue); border: none; border-radius: var(--radius-sm);
    font-family: var(--font); font-size: 17px; font-weight: 600;
    color: #fff; cursor: pointer; letter-spacing: -0.2px;
    transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
    will-change: transform;
  }
  .generate-btn:hover { background: var(--blue-dark); }
  .generate-btn:active { transform: scale(0.985); }
  .generate-btn:disabled { background: var(--label4); cursor: not-allowed; transform: none; }
  .generate-btn .btn-icon { width: 20px; height: 20px; }
  .btn-ripple {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: scale(0); animation: ripple 0.5s ease;
    pointer-events: none;
  }
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }

  /* ─── RESULTS ─── */
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; padding: 0 2px;
  }
  .results-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; color: var(--label); }
  .results-count {
    font-size: 12px; font-weight: 600; color: var(--blue);
    background: rgba(0,122,255,0.1); padding: 4px 10px; border-radius: 20px;
  }
  .copy-all-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px;
    background: transparent; border: 1.5px solid var(--blue);
    font-family: var(--font); font-size: 13px; font-weight: 600;
    color: var(--blue); cursor: pointer; transition: all var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .copy-all-btn:hover { background: rgba(0,122,255,0.08); }
  .copy-all-btn img { width: 14px; height: 14px; }

  /* ─── ADDRESS CARD ─── */
  .address-cards { display: flex; flex-direction: column; gap: 14px; }

  .address-card {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--card-shadow); overflow: hidden;
    opacity: 0; transform: translateY(16px);
    animation: slideUp 0.38s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    will-change: transform, opacity;
  }
  .address-card:nth-child(1) { animation-delay: 0.04s; }
  .address-card:nth-child(2) { animation-delay: 0.12s; }
  .address-card:nth-child(3) { animation-delay: 0.20s; }
  .address-card:nth-child(4) { animation-delay: 0.28s; }
  .address-card:nth-child(5) { animation-delay: 0.36s; }

  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px;
    border-bottom: 0.5px solid var(--separator);
  }
  .card-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--blue); color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-country-name { font-size: 14px; font-weight: 600; color: var(--label); flex: 1; }
  .card-flag { width: 24px; height: 16px; border-radius: 3px; object-fit: cover; border: 0.5px solid rgba(0,0,0,0.08); }

  .card-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }

  .addr-row { display: flex; gap: 10px; align-items: flex-start; }
  .addr-row-icon { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .addr-row-icon.blue { background: rgba(0,122,255,0.1); }
  .addr-row-icon.green { background: rgba(52,199,89,0.1); }
  .addr-row-icon.orange { background: rgba(255,149,0,0.1); }
  .addr-row-icon.teal { background: rgba(90,200,250,0.1); }
  .addr-row-icon.red { background: rgba(255,59,48,0.1); }
  .addr-row-icon img { width: 16px; height: 16px; }
  .addr-row-content {}
  .addr-row-key { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--label3); margin-bottom: 2px; }
  .addr-row-val { font-size: 15px; font-weight: 400; color: var(--label); line-height: 1.35; }

  .card-footer {
    padding: 0 18px 14px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .card-btn {
    height: 40px; border-radius: 10px; border: none;
    font-family: var(--font); font-size: 14px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: all var(--transition); -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
  }
  .card-btn img { width: 16px; height: 16px; }
  .card-btn.copy { background: rgba(0,122,255,0.1); color: var(--blue); }
  .card-btn.copy:hover { background: rgba(0,122,255,0.18); }
  .card-btn.copy.success { background: rgba(52,199,89,0.12); color: var(--green); }
  .card-btn.regen { background: var(--surface2); color: var(--label2); }
  .card-btn.regen:hover { background: var(--surface3); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 48px 24px; text-align: center;
  }
  .empty-icon { width: 64px; height: 64px; margin: 0 auto 16px; opacity: 0.25; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--label); margin-bottom: 6px; }
  .empty-desc { font-size: 14px; color: var(--label3); line-height: 1.5; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(50,50,52,0.96); color: #fff;
    padding: 12px 20px; border-radius: 20px;
    font-size: 14px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.3s;
    z-index: 200; white-space: nowrap;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    pointer-events: none; opacity: 0;
    will-change: transform, opacity;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast img { width: 16px; height: 16px; filter: invert(1); }

  /* ─── LOADING SPINNER ─── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .loading .spinner { display: block; }
  .loading .btn-label { display: none; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--label4); border-radius: 3px; }

  /* ─── COPYABLE FIELDS ─── */
  .copyable-field {
    cursor: pointer;
    border-radius: 8px;
    padding: 4px 6px;
    margin: -4px -6px;
    transition: background var(--transition);
    position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .copyable-field:hover { background: rgba(0,122,255,0.06); }
  .copyable-field:active { background: rgba(0,122,255,0.12); }
  .copyable-field.field-copied { background: rgba(52,199,89,0.12); }
  .copyable-field.field-copied .addr-row-val { color: var(--green); }
  .field-copy-hint {
    opacity: 0; color: var(--label4);
    display: flex; align-items: center;
    transition: opacity var(--transition);
    flex-shrink: 0; margin-left: auto; padding-left: 8px;
  }
  .copyable-field:hover .field-copy-hint { opacity: 1; }

  @media (max-width: 480px) {
    .main { padding: 16px 12px 100px; }
    .country-grid { grid-template-columns: 1fr; }
    .header-title { font-size: 19px; }
    .card-footer { grid-template-columns: 1fr; }
  }
</style>

<style>
  /* Security overlay */
  #devtools-warning {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92);
    z-index: 99999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #devtools-warning.show { display: flex; }
  #devtools-warning .warn-icon {
    font-size: 56px;
    animation: pulse-warn 1.2s ease-in-out infinite;
  }
  @keyframes pulse-warn {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  #devtools-warning p {
    color: #fff;
    font-family: -apple-system, sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    letter-spacing: -0.3px;
  }
  #devtools-warning small {

  }
  /* Disable text selection globally */
  body {

    user-select: none !important;
    -webkit-touch-callout: none !important;
  }
  /* Disable drag */
  * { -webkit-user-drag: none !important; }
</style>
</head>

<!-- Auth Guard -->
<script>
(function() {
  'use strict';
  const SESSION_KEY = "gh_session";
  function getCookie(name) {
    return document.cookie.split("; ").reduce(function(acc, c) {
      var parts = c.split("="); return parts[0] === name ? parts[1] : acc;
    }, "");
  }
  if (getCookie(SESSION_KEY) !== "ok") {
    window.location.replace("/login.html");
  }
})();
</script>


<!-- DevTools Warning Overlay -->
<div id="devtools-warning">
  <div class="warn-icon">🔒</div>
  <p>Developer Tools Detected</p>
  <small>This page is protected. Please close DevTools to continue.</small>
</div>

<script>
// ═══════════════════════════════════════════════════════
// SECURITY PROTECTION SYSTEM
// ═══════════════════════════════════════════════════════
(function() {
  'use strict';

  // 1. Disable right-click context menu
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
  }, true);

  // 2. Disable text selection via mouse
  document.addEventListener('selectstart', function(e) {
    e.preventDefault();
    return false;
  }, true);

  // 3. Disable drag
  document.addEventListener('dragstart', function(e) {
    e.preventDefault();
    return false;
  }, true);

  // 4. Block keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    const key = e.key ? e.key.toLowerCase() : '';
    const ctrl = e.ctrlKey || e.metaKey;

    // Block Ctrl+U (View Source)
    if (ctrl && key === 'u') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+S (Save)
    if (ctrl && key === 's') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+P (Print)
    if (ctrl && key === 'p') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+A (Select All)
    if (ctrl && key === 'a') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+C only on non-input elements (allow copy button functionality)
    if (ctrl && key === 'c') {
      const tag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
      if (tag !== 'input' && tag !== 'textarea') {
        e.preventDefault(); e.stopPropagation(); return false;
      }
    }
    // Block F12
    if (e.key === 'F12') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+Shift+I (DevTools)
    if (ctrl && e.shiftKey && key === 'i') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+Shift+J (Console)
    if (ctrl && e.shiftKey && key === 'j') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+Shift+C (Inspector)
    if (ctrl && e.shiftKey && key === 'c') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+Shift+K (Firefox console)
    if (ctrl && e.shiftKey && key === 'k') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+Shift+E (Network tab)
    if (ctrl && e.shiftKey && key === 'e') { e.preventDefault(); e.stopPropagation(); return false; }
    // Block Ctrl+Shift+M (Mobile mode)
    if (ctrl && e.shiftKey && key === 'm') { e.preventDefault(); e.stopPropagation(); return false; }
  }, true);

  // 5. Block print via CSS + JS
  window.addEventListener('beforeprint', function(e) {
    e.preventDefault();
    document.body.style.display = 'none';
    setTimeout(function() { document.body.style.display = ''; }, 100);
  });

  // 6. DevTools detection via window size difference
  var devtoolsOpen = false;
  var threshold = 160;

  function checkDevTools() {
    var widthDiff = window.outerWidth - window.innerWidth;
    var heightDiff = window.outerHeight - window.innerHeight;
    var isOpen = widthDiff > threshold || heightDiff > threshold;

    if (isOpen && !devtoolsOpen) {
      devtoolsOpen = true;
      document.getElementById('devtools-warning').classList.add('show');
      document.body.style.filter = 'blur(12px)';
      document.body.style.pointerEvents = 'none';
    } else if (!isOpen && devtoolsOpen) {
      devtoolsOpen = false;
      document.getElementById('devtools-warning').classList.remove('show');
      document.body.style.filter = '';
      document.body.style.pointerEvents = '';
    }
  }

  // 7. Debugger trap — slows down devtools significantly
  var devtoolsTrap = function() {
    var before = new Date();
    // eslint-disable-next-line no-debugger
    (function() {}['constructor']('debugger')());
    var after = new Date();
    if (after - before > 100) {
      document.getElementById('devtools-warning').classList.add('show');
      document.body.style.filter = 'blur(12px)';
      document.body.style.pointerEvents = 'none';
    }
  };

  // 8. Periodic checks
  setInterval(checkDevTools, 1000);
  setInterval(devtoolsTrap, 3000);
  window.addEventListener('resize', checkDevTools);

  // 9. Disable middle mouse button paste
  document.addEventListener('mousedown', function(e) {
    if (e.button === 1) { e.preventDefault(); return false; }
  }, true);

  // 10. Disable copy event from clipboard
  document.addEventListener('copy', function(e) {
    var activeTag = document.activeElement ? document.activeElement.className : '';
    // Only block if NOT triggered by our copy buttons
    if (!activeTag.includes('card-btn') && !activeTag.includes('copyable-field')) {
      e.clipboardData && e.clipboardData.setData('text/plain', '');
      e.preventDefault();
    }
  }, false);

})();
</script>

// ═══════════════════════════════════════════════════════
// FLAG URL
// ═══════════════════════════════════════════════════════
function flagUrl(code) {
  return `https://flagcdn.com/w40/${code.toLowerCase()}.png`;
}

// ═══════════════════════════════════════════════════════
// RANDOM HELPERS
// ═══════════════════════════════════════════════════════
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }
function randDigits(n) { return Array.from({length:n},()=>randInt(0,9)).join(""); }

function formatZip(pattern) {
  if(!pattern) return "";
  return pattern.replace(/#/g,()=>randInt(0,9))
                .replace(/\?/g,()=>String.fromCharCode(65+randInt(0,25)));
}

// ═══════════════════════════════════════════════════════
// PHONE NUMBER GENERATOR
// ═══════════════════════════════════════════════════════
function generatePhone(country) {
  const pfx = country.phone;
  const code = country.code;
  // US/CA
  if(code==="us"||code==="ca") return `${pfx} (${randInt(200,999)}) ${randInt(200,999)}-${randInt(1000,9999)}`;
  if(code==="gb") return `${pfx} ${randInt(1000,9999)} ${randInt(100000,999999)}`;
  if(code==="jp") return `${pfx} ${randInt(10,99)}-${randInt(1000,9999)}-${randInt(1000,9999)}`;
  if(code==="au") return `${pfx} ${randInt(2,9)}${randInt(1000,9999)} ${randInt(1000,9999)}`;
  if(code==="de") return `${pfx} ${randInt(10,999)} ${randInt(1000000,9999999)}`;
  if(code==="fr") return `${pfx} ${randInt(1,9)} ${randInt(10,99)} ${randInt(10,99)} ${randInt(10,99)} ${randInt(10,99)}`;
  if(code==="cn") return `${pfx} ${randInt(10,19)}${randInt(10000000,99999999)}`;
  if(code==="in") return `${pfx} ${randInt(60000,99999)}${randInt(10000,99999)}`;
  return `${pfx} ${randInt(100,999)} ${randInt(100,999)} ${randInt(1000,9999)}`;
}

function generateAddress(country) {
  const code = country.code;
  const data = ADDRESS_DATA[code];
  const nameSet = NAMES[code] || GENERIC_NAMES;

  const firstName = rand(nameSet.first);
  const lastName = rand(nameSet.last);
  const fullName = `${firstName} ${lastName}`;

  let street, city, state="", zip="", fullZip="";

  if(data) {
    street = rand(data.streets);
    city = rand(data.cities);
    if(data.states) state = data.states[data.cities.indexOf(city)] || rand(data.states);
    if(data.provinces) state = data.provinces[data.cities.indexOf(city)] || rand(data.provinces);
    if(data.zips) zip = data.zips[data.cities.indexOf(city)] || rand(data.zips);
    if(data.postcodes) zip = data.postcodes[data.cities.indexOf(city)] || rand(data.postcodes);
    if(data.zipStart) zip = String(data.zipStart[data.cities.indexOf(city)] + randInt(0,999) || rand(data.zipStart) + randInt(0,999));
  } else {
    street = `${randInt(1,999)} Main Street`;
    city = "City Center";
    zip = formatZip(country.zip);
  }

  if(!zip || zip==="") zip = formatZip(country.zip) || "";
  if(zip && typeof zip === "number") zip = String(zip);

  const phone = generatePhone(country);
  const apt = Math.random() > 0.6 ? `, Apt ${randInt(1,99)}` : "";

  return {
    name: fullName,
    street: `${street}${apt}`,
    city,
    state,
    zip: String(zip),
    country: country.name,
    phone
  };
}

// ═══════════════════════════════════════════════════════
// FORMAT ADDRESS FOR COPY
// ═══════════════════════════════════════════════════════
function formatForCopy(addr) {
  const parts = [addr.name, addr.street];
  const cityLine = [addr.city, addr.state, addr.zip].filter(Boolean).join(", ");
  parts.push(cityLine, addr.country, addr.phone);
  return parts.filter(Boolean).join("\n");
}
function formatForPlatform(addr, platform) {
  let street1 = addr.street;
  let street2 = "";
  const aptMatch = addr.street.match(/^(.*?),\s*(Apt .+)$/);
  if(aptMatch) { street1 = aptMatch[1].trim(); street2 = aptMatch[2].trim(); }

  if(platform === "apple") {
    const lines = [
      `Full Name: ${addr.name}`,
      `Street: ${street1}`,
      `Street 2: ${street2 || "—"}`,
      `City: ${addr.city}`,
      `State: ${getFullStateName(addr.state) || "—"}`,
      `Zip: ${addr.zip || "—"}`,
      `Phone: ${addr.phone}`
    ];
    return lines.join("\n");
  } else {
    const lines = [
      `Street: ${street1}`,
      `Apt, suite, etc.: ${street2 || "—"}`,
      `City: ${addr.city}`,
      `Postal Code: ${addr.zip || "—"}`
    ];
    return lines.join("\n");
  }
}

function toggleDropdown() {
  dropOpen = !dropOpen;
  const wrap = document.getElementById("gridWrap");
  const chevron = document.getElementById("chevron");
  if(dropOpen) {
    wrap.classList.add("open");
    chevron.classList.add("rotated");
    renderCountryGrid();
    document.getElementById("searchInput").focus();
  } else {
    wrap.classList.remove("open");
    chevron.classList.remove("rotated");
  }
}

function selectCountry(code) {
  selectedCountry = COUNTRIES.find(c=>c.code===code);
  document.getElementById("selFlag").src = flagUrl(code);
  document.getElementById("selName").textContent = selectedCountry.name;
  dropOpen = false;
  document.getElementById("gridWrap").classList.remove("open");
  document.getElementById("chevron").classList.remove("rotated");

}

// ═══════════════════════════════════════════════════════
// PLATFORM SELECT
// ═══════════════════════════════════════════════════════
function selectPlatform(p) {
  selectedPlatform = p;
  document.getElementById("btnApple").classList.toggle("active", p==="apple");
  document.getElementById("btnGoogle").classList.toggle("active", p==="google");
  document.getElementById("btnCard").classList.toggle("active", p==="card");

  // Update button label
  const lbl = document.getElementById("generateBtnLabel");
  if(lbl) lbl.textContent = p === "card" ? "Generate Cards" : "Generate Addresses";

  // Hide/show country section
  const countrySection = document.getElementById("countrySectionWrap");
  const countrySep = document.getElementById("countrySeparator");
  if(p === "card") {
    countrySection.style.display = "none";
    if(countrySep) countrySep.style.display = "none";
    document.querySelector(".qty-title").textContent = "Number of Cards";
    document.querySelector(".qty-desc").textContent = "Show up to 5 cards at once";
    document.getElementById("stepUp").disabled = qty >= Math.min(5, CARDS_DATA.length);
    document.getElementById("stepDown").disabled = qty <= 1;
    if(qty > CARDS_DATA.length) {
      qty = Math.max(1, CARDS_DATA.length);
      document.getElementById("stepCount").textContent = qty;
    }
  } else {
    countrySection.style.display = "";
    if(countrySep) countrySep.style.display = "";
    document.querySelector(".qty-title").textContent = "Number of Addresses";
    document.querySelector(".qty-desc").textContent = "Generate up to 5 addresses at once";
    document.getElementById("stepDown").disabled = qty <= 1;
    document.getElementById("stepUp").disabled = qty >= 5;
  }
}

// ═══════════════════════════════════════════════════════
// QTY STEPPER
// ═══════════════════════════════════════════════════════
function changeQty(delta) {
  const maxQty = selectedPlatform === "card" ? Math.min(5, CARDS_DATA.length) : 5;
  qty = Math.max(1, Math.min(maxQty, qty+delta));
  document.getElementById("stepCount").textContent = qty;
  document.getElementById("stepDown").disabled = qty<=1;
  document.getElementById("stepUp").disabled = qty>=maxQty;
}

function copyFieldValue(val, el) {
  navigator.clipboard.writeText(val).then(()=>{
    showToast("Copied: " + val);
    el.classList.add("field-copied");
    setTimeout(()=>el.classList.remove("field-copied"), 1200);
  }).catch(()=>{
    const ta = document.createElement("textarea");
    ta.value = val; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    showToast("Copied: " + val);
    el.classList.add("field-copied");
    setTimeout(()=>el.classList.remove("field-copied"), 1200);
  });
}

      { key:"Phone", val: addr.phone, icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5AC8FA" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.64 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`, color:"teal" },
    ];
    rows = fields.map(f=>`
      <div class="addr-row copyable-field" onclick="copyFieldValue('${f.val.replace(/'/g,"\\'")}', this)" title="Tap to copy">
        <div class="addr-row-icon ${f.color}">${f.icon}</div>
        <div class="addr-row-content">
          <div class="addr-row-key">${f.key}</div>
          <div class="addr-row-val">${f.val}</div>
        </div>
        <div class="field-copy-hint"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
      </div>`).join("");
  } else {
    // Google Play format: Street, Apt/suite, City, Postal Code
    const gpFields = [
      { key:"Street", val: street1, icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>`, color:"blue" },
      { key:"Apt, suite, etc.", val: street2 || "—", icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>`, color:"blue" },
      { key:"City", val: addr.city, icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF9500" stroke-width="2.2"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>`, color:"orange" },
      { key:"Postal Code", val: addr.zip || "—", icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg>`, color:"red" },
    ];
    rows = gpFields.map(f=>`
      <div class="addr-row copyable-field" onclick="copyFieldValue('${f.val.replace(/'/g,"\\'")}', this)" title="Tap to copy">
        <div class="addr-row-icon ${f.color}">${f.icon}</div>
        <div class="addr-row-content">
          <div class="addr-row-key">${f.key}</div>
          <div class="addr-row-val">${f.val}</div>
        </div>
        <div class="field-copy-hint"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
      </div>`).join("");
  }

  return `
  <div class="address-card">
    <div class="card-header">
      <div class="card-num">${i+1}</div>
      <span class="card-country-name">${addr.country}</span>
      <img class="card-flag" src="${flag}" alt="${addr.country}" onerror="this.style.display='none'">
    </div>
    <div class="card-body">${rows}</div>
    <div class="card-footer">
      <button class="card-btn copy" id="copyBtn${i}" onclick="copyCard(${i}, this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy All Fields
      </button>
      <button class="card-btn regen" onclick="regenCard(${i})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Regenerate
      </button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// CARD RENDERING
// ═══════════════════════════════════════════════════════
function renderCardResults() {
  if(CARDS_DATA.length === 0) {
    document.getElementById("resultsArea").innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>
        <div class="empty-title">No cards added yet</div>
        <div class="empty-desc">Open the HTML file and add your card info<br>inside the CARDS_DATA array in the script.</div>
      </div>`;
    return;
  }
  const count = Math.min(qty, CARDS_DATA.length);
  // Randomly shuffle and pick `count` unique cards
  const shuffled = [...CARDS_DATA].sort(() => Math.random() - 0.5);
  const shown = shuffled.slice(0, count);
  const area = document.getElementById("resultsArea");
  area.innerHTML = `
    <div class="results-header">
      <div class="results-title">Cards</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="results-count">${shown.length} card${shown.length>1?"s":""}</span>
      </div>
    </div>
    <div class="address-cards">
      ${shown.map((card, i) => renderCreditCard(card, i)).join("")}
    </div>`;
}

function renderCreditCard(card, i) {
  const theme = card.theme || CARD_THEMES[i % CARD_THEMES.length];
  const maskedNum = card.number;

  // Network logo
  const networkLogos = {
    "Mastercard": `<svg viewBox="0 0 38 24" width="46" height="29" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="38" height="24" rx="4" fill="none"/><circle cx="15" cy="12" r="9" fill="#EB001B" opacity="0.95"/><circle cx="23" cy="12" r="9" fill="#F79E1B" opacity="0.95"/><path d="M19 5.5a9 9 0 0 1 0 13 9 9 0 0 1 0-13z" fill="#FF5F00" opacity="0.95"/></svg>`,
    "VISA": `<svg viewBox="0 0 60 20" width="52" height="18" xmlns="http://www.w3.org/2000/svg"><text x="0" y="16" font-family="Arial,sans-serif" font-size="18" font-weight="900" font-style="italic" fill="white" letter-spacing="1">VISA</text></svg>`,
    "AMEX": `<svg viewBox="0 0 60 20" width="52" height="18" xmlns="http://www.w3.org/2000/svg"><text x="0" y="16" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="white" letter-spacing="0.5">AMEX</text></svg>`,
  };
  let netLogo = networkLogos[card.network] || `<span style="font-size:13px;font-weight:900;color:#fff;letter-spacing:1px;">${card.network||"VISA"}</span>`;

  // Unique background decoration per card
  const decorations = [
    // circles top-right
    `<div class="cc-bg-circle" style="width:180px;height:180px;background:${theme.accent};opacity:0.18;top:-60px;right:-60px;"></div><div class="cc-bg-circle" style="width:120px;height:120px;background:${theme.accent};opacity:0.12;bottom:-30px;left:-30px;"></div>`,
    // big circle bottom-left
    `<div class="cc-bg-circle" style="width:220px;height:220px;background:${theme.accent};opacity:0.15;bottom:-80px;left:-80px;"></div><div class="cc-bg-circle" style="width:80px;height:80px;background:#fff;opacity:0.06;top:-20px;right:20px;"></div>`,
    // diagonal stripe feel
    `<div class="cc-bg-circle" style="width:260px;height:260px;background:${theme.accent};opacity:0.12;top:-100px;right:-100px;"></div>`,
    // small scattered
    `<div class="cc-bg-circle" style="width:100px;height:100px;background:#fff;opacity:0.07;top:-20px;left:50%;"></div><div class="cc-bg-circle" style="width:160px;height:160px;background:${theme.accent};opacity:0.14;bottom:-50px;right:-50px;"></div>`,
    // centered glow
    `<div class="cc-bg-circle" style="width:300px;height:300px;background:${theme.accent};opacity:0.10;top:50%;left:50%;transform:translate(-50%,-50%);"></div>`,
  ];
  const deco = decorations[i % decorations.length];

  const fields = [
    { key:"Card Number", val: card.number, icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.2"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>`, color:"blue" },
    { key:"Card Holder", val: card.holder, icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`, color:"green" },
    { key:"Expiry Date", val: card.expiry, icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF9500" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`, color:"orange" },
    { key:"CVV", val: card.cvv, icon:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`, color:"red" },
  ];

  const rows = fields.map(f=>`
    <div class="addr-row copyable-field" data-val="${f.val}" onclick="copyFieldValue(this.dataset.val, this)" title="Tap to copy">
      <div class="addr-row-icon ${f.color}">${f.icon}</div>
      <div class="addr-row-content">
        <div class="addr-row-key">${f.key}</div>
        <div class="addr-row-val">${f.val}</div>
      </div>
      <div class="field-copy-hint"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
    </div>`).join("");

  return `
  <div class="address-card">
    <div style="padding:16px 16px 0;">
      <div class="credit-card-visual" style="background:linear-gradient(135deg,${theme.from},${theme.to});">
        ${deco}
        <div class="cc-top-row">
          <span class="cc-network-logo">${netLogo}</span>
        </div>
        <div class="cc-number">${maskedNum}</div>
        <div class="cc-bottom-row">
          <div>
            <div class="cc-holder-label">Card Holder</div>
            <div class="cc-holder-name">${card.holder}</div>
          </div>
          <div class="cc-cvv-wrap">
            <div class="cc-cvv-label">CVV</div>
            <div class="cc-cvv-val">${card.cvv}</div>
          </div>
          <div class="cc-expiry-wrap">
            <div class="cc-expiry-label">Expires</div>
            <div class="cc-expiry-val">${card.expiry}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">${rows}</div>
    <div class="card-footer">
      <button class="card-btn copy" id="ccCopyBtn${i}" onclick="copyCardData(${i}, this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy All Fields
      </button>
      <button class="card-btn regen" onclick="copyCardNumber(${i})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>
        Copy Number
      </button>
    </div>
  </div>`;
}

function copyCardData(i, btn) {
  const card = CARDS_DATA[i];
  const text = `Card Number: ${card.number}\nCard Holder: ${card.holder}\nExpiry: ${card.expiry}\nCVV: ${card.cvv}`;
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add("success");
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Copied`;
    showToast("Card info copied!");
    setTimeout(()=>{
      btn.classList.remove("success");
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy All Fields`;
    }, 2200);
  }).catch(()=>{ showToast("Card info copied!"); });
}

function copyCardNumber(i) {
  const card = CARDS_DATA[i];
  navigator.clipboard.writeText(card.number).then(()=>showToast("Card number copied!"))
  .catch(()=>{ showToast("Copied!"); });
}

// ═══════════════════════════════════════════════════════
// COPY FUNCTIONS
// ═══════════════════════════════════════════════════════
function copyCard(i, btn) {
  const text = formatForPlatform(generatedAddresses[i], selectedPlatform);
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add("success");
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Copied`;
    showToast("Address copied!");
    setTimeout(()=>{
      btn.classList.remove("success");
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
    }, 2200);
  }).catch(()=>{
    // Fallback
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    showToast("Address copied!");
  });
}

function copyAll() {
  const text = generatedAddresses.map((a,i)=>`— Address ${i+1} —\n${formatForPlatform(a, selectedPlatform)}`).join("\n\n");
  navigator.clipboard.writeText(text).then(()=>showToast("All addresses copied!"))
  .catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    showToast("All addresses copied!");
  });
}

// ═══════════════════════════════════════════════════════
// REGENERATE SINGLE CARD
// ═══════════════════════════════════════════════════════
function regenCard(i) {
  generatedAddresses[i] = generateAddress(selectedCountry);
  const flag = flagUrl(selectedCountry.code);
  const cards = document.querySelector(".address-cards");
  if(!cards) return;
  const cardEls = cards.children;
  if(cardEls[i]) {
    cardEls[i].style.opacity = "0.5";
    setTimeout(()=>{
      cardEls[i].outerHTML = renderCard(generatedAddresses[i], i, flag);
    }, 150);
  }
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  toast.classList.add("show");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove("show"), 2000);
}

// ═══════════════════════════════════════════════════════
// SEARCH INPUT
// ═══════════════════════════════════════════════════════
document.getElementById("searchInput").addEventListener("input", function() {
  if(!dropOpen) {
    dropOpen = true;
    document.getElementById("gridWrap").classList.add("open");
    document.getElementById("chevron").classList.add("rotated");
  }
  renderCountryGrid(this.value);
});

// Close dropdown on outside click
document.addEventListener("click", function(e) {
  const wrap = document.getElementById("gridWrap");
  const display = document.getElementById("selectedDisplay");
  const search = document.getElementById("searchInput");
  if(dropOpen && !wrap.contains(e.target) && !display.contains(e.target) && e.target!==search) {
    dropOpen = false;
    wrap.classList.remove("open");
    document.getElementById("chevron").classList.remove("rotated");
  }
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
(function init() {
  // Set US as default
  document.getElementById("selFlag").src = flagUrl("us");
  document.getElementById("selFlag").onerror = function(){this.style.display="none"};
  document.getElementById("selName").textContent = "United States";

  // Disable stepper buttons
  document.getElementById("stepDown").disabled = true;
  document.getElementById("stepUp").disabled = false;

  // Ripple effect on generate button
  document.getElementById("generateBtn").addEventListener("click", function(e) {
    const btn = this;
    const circle = document.createElement("div");
    circle.className = "btn-ripple";
    const d = Math.max(btn.clientWidth, btn.clientHeight);
    circle.style.width = circle.style.height = d+"px";
    const rect = btn.getBoundingClientRect();
    circle.style.left = (e.clientX-rect.left-d/2)+"px";
    circle.style.top = (e.clientY-rect.top-d/2)+"px";
    btn.appendChild(circle);
    setTimeout(()=>circle.remove(), 500);
  });
})();
</script>
