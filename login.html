<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GenHub – Sign In</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f5f7">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f7;
    --card: rgba(255,255,255,0.82);
    --label: #1d1d1f;
    --label2: #6e6e73;
    --blue: #0071e3;
    --blue2: #0077ed;
    --sep: rgba(0,0,0,0.08);
    --icon-size: 76px;
    --red: #ff3b30;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── Floating icon grid (iCloud style) ── */
  .icon-cloud {
    position: relative;
    width: 280px;
    height: 220px;
    margin-bottom: 10px;
  }

  .icon-bubble {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    animation: float 3s ease-in-out infinite;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  /* Center logo */
  .bubble-logo {
    width: 90px; height: 90px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    animation-delay: 0s;
    z-index: 10;
    padding: 6px;
    overflow: hidden;
  }
  .bubble-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .bubble-apple   { width: 52px; height: 52px; top: 14px;  left: 20px;  background: #1c1c1e; animation-delay: 0.4s; }
  .bubble-google  { width: 48px; height: 48px; top: 8px;   right: 18px; background: #fff;    animation-delay: 0.7s; }
  .bubble-card    { width: 50px; height: 50px; top: 50%;   left: 4px;   transform: translateY(-50%); background: linear-gradient(135deg,#5856d6,#af52de); animation-delay: 1.0s; }
  .bubble-addr    { width: 46px; height: 46px; top: 50%;   right: 4px;  transform: translateY(-50%); background: linear-gradient(135deg,#34c759,#30d158); animation-delay: 1.3s; }
  .bubble-phone   { width: 44px; height: 44px; bottom: 10px; left: 22px; background: linear-gradient(135deg,#0071e3,#30b0c7); animation-delay: 1.6s; }
  .bubble-home    { width: 46px; height: 46px; bottom: 6px;  left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#ff9500,#ff6c02); animation-delay: 1.9s; }
  .bubble-world   { width: 44px; height: 44px; bottom: 10px; right: 22px; background: linear-gradient(135deg,#5ac8fa,#007aff); animation-delay: 2.2s; }
  .bubble-postal  { width: 42px; height: 42px; top: 16px;  left: 50%;  transform: translateX(-50%); background: linear-gradient(135deg,#ff3b30,#ff6961); animation-delay: 0.2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-7px); }
  }
  .bubble-logo { animation: float-center 3s ease-in-out infinite; }
  @keyframes float-center {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%       { transform: translate(-50%, calc(-50% - 6px)) scale(1.03); }
  }
  .bubble-card  { animation: float-left  3s ease-in-out 1.0s infinite; }
  .bubble-addr  { animation: float-right 3s ease-in-out 1.3s infinite; }
  @keyframes float-left  { 0%,100%{transform:translateY(-50%)} 50%{transform:translateY(calc(-50% - 7px))} }
  @keyframes float-right { 0%,100%{transform:translateY(-50%)} 50%{transform:translateY(calc(-50% - 7px))} }

  /* svg icons inside bubbles */
  .bubble-icon { width: 24px; height: 24px; fill: #fff; }
  .bubble-google .bubble-icon { fill: none; }

  /* ── Brand ── */
  .brand { text-align: center; margin-bottom: 28px; }
  .brand h1 { font-size: 36px; font-weight: 700; letter-spacing: -1px; color: var(--label); }
  .brand p  { font-size: 14px; color: var(--label2); margin-top: 4px; }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    backdrop-filter: saturate(180%) blur(30px);
    -webkit-backdrop-filter: saturate(180%) blur(30px);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: 0 2px 40px rgba(0,0,0,0.10), 0 1px 0 rgba(255,255,255,0.6) inset;
  }

  .card h2 {
    font-size: 22px; font-weight: 600;
    color: var(--label);
    text-align: center;
    margin-bottom: 6px;
  }
  .card p.sub {
    font-size: 13px; color: var(--label2);
    text-align: center;
    margin-bottom: 22px;
  }

  .field-wrap { position: relative; margin-bottom: 14px; }
  .field-label {
    display: block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--label2); margin-bottom: 6px;
  }

  input[type=password] {
    width: 100%; height: 46px;
    background: rgba(0,0,0,0.04);
    border: 1.5px solid var(--sep);
    border-radius: 12px;
    font-size: 16px; letter-spacing: 3px;
    padding: 0 14px;
    color: var(--label);
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  input[type=password]:focus {
    border-color: var(--blue);
    background: rgba(0,113,227,0.04);
  }
  input[type=password].shake {
    animation: shake 0.4s ease;
    border-color: var(--red);
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-6px)}
    80%{transform:translateX(6px)}
  }

  .error-msg {
    font-size: 12px; color: var(--red);
    text-align: center;
    margin-bottom: 10px;
    min-height: 18px;
    transition: opacity 0.3s;
  }

  .btn-signin {
    width: 100%; height: 50px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: inherit;
    font-size: 17px; font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-signin:hover  { background: var(--blue2); }
  .btn-signin:active { transform: scale(0.98); }
  .btn-signin:disabled { background: #8e8e93; cursor: not-allowed; transform: none; }

  /* lockout banner */
  .lockout-banner {
    display: none;
    background: rgba(255,59,48,0.1);
    border: 1px solid rgba(255,59,48,0.25);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--red);
    text-align: center;
    line-height: 1.5;
  }

  .footer-note {
    text-align: center;
    margin-top: 18px;
    font-size: 11px;
    color: var(--label2);
  }
</style>
</head>

// ── Check existing session ───────────────────────────
(function init() {
  // Check lockout
  if (isLocked()) { showLockout(); return; }

  // Check valid session cookie
  const sess = getCookie(SESSION_KEY);
  if (sess === "ok") { goApp(); return; }
})();

// ── Login function ───────────────────────────────────
function doLogin() {
  if (isLocked()) { showLockout(); return; }

  const pw = document.getElementById("pwInput").value;

  if (pw === CORRECT_PW) {
    // Correct — set session (expires in 24h)
    setCookie(SESSION_KEY, "ok", 1);
    localStorage.removeItem(ATT_KEY);
    localStorage.removeItem(LOCK_KEY);
    goApp();
  } else {
    // Wrong password
    let attempts = parseInt(localStorage.getItem(ATT_KEY) || "0") + 1;
    localStorage.setItem(ATT_KEY, attempts);

    const input = document.getElementById("pwInput");
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 400);

    if (attempts >= MAX_ATTEMPTS) {
      const lockUntil = Date.now() + LOCKOUT_MS;
      localStorage.setItem(LOCK_KEY, lockUntil);
      localStorage.removeItem(ATT_KEY);
      showLockout();
    } else {
      const left = MAX_ATTEMPTS - attempts;
      document.getElementById("errorMsg").textContent =
        `Incorrect password. ${left} attempt${left !== 1 ? "s" : ""} remaining.`;
    }
  }
}

// ── Lockout ──────────────────────────────────────────
function isLocked() {
  const lockUntil = localStorage.getItem(LOCK_KEY);
  if (!lockUntil) return false;
  if (Date.now() < parseInt(lockUntil)) return true;
  localStorage.removeItem(LOCK_KEY);
  return false;
}

function showLockout() {
  const lockUntil = parseInt(localStorage.getItem(LOCK_KEY));
  const remainMin = Math.ceil((lockUntil - Date.now()) / 60000);

  document.getElementById("lockoutBanner").style.display = "block";
  document.getElementById("signinBtn").disabled = true;
  document.getElementById("pwInput").disabled = true;
  document.getElementById("errorMsg").textContent = "";

  function updateTimer() {
    const remain = lockUntil - Date.now();
    if (remain <= 0) {
      localStorage.removeItem(LOCK_KEY);
      location.reload();
      return;
    }
    const m = Math.floor(remain / 60000);
    const s = Math.floor((remain % 60000) / 1000);
    document.getElementById("lockoutBanner").innerHTML =
      `🔒 Too many failed attempts.<br>Please wait <strong>${m}m ${s}s</strong> before trying again.`;
    setTimeout(updateTimer, 1000);
  }
  updateTimer();
}

// ── Cookie helpers ───────────────────────────────────
function setCookie(name, val, days) {
  const exp = new Date(Date.now() + days * 864e5).toUTCString();
  document.cookie = `${name}=${val}; expires=${exp}; path=/; SameSite=Strict`;
}
function getCookie(name) {
  return document.cookie.split("; ").reduce((acc, c) => {
    const [k, v] = c.split("=");
    return k === name ? v : acc;
  }, "");
}

// ── Navigate ─────────────────────────────────────────
function goApp() { window.location.href = "/index.html"; }

// Enter key
document.addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>
